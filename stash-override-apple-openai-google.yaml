# ============================================================
# Stash 覆写配置
# 来源: Apple HT210060 (support.apple.com/en-us/101555)
#        + OpenAI + Google 全域名
# 说明: 所有匹配域名强制走代理 (请将 PROXY 替换为你实际的代理组名称)
# ============================================================

name: "Apple + OpenAI + Google 全代理覆写"

# ---------- 规则集引用（可选，用于更新维护） ----------
rule-providers:
  apple-enterprise:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml"
    path: ./rules/apple.yaml
    interval: 86400

  openai:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml"
    path: ./rules/openai.yaml
    interval: 86400

  google:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.yaml"
    path: ./rules/google.yaml
    interval: 86400

# ---------- 覆写规则（prepend 确保优先匹配） ----------
override:
  rules:
    prepend:
      # ========== Apple 企业网络域名 (HT210060 / 101555) ==========
      # Apple 核心服务
      - DOMAIN-SUFFIX,apple.com,PROXY
      - DOMAIN-SUFFIX,apple-cloudkit.com,PROXY
      - DOMAIN-SUFFIX,apple.news,PROXY
      - DOMAIN-SUFFIX,apple-mapkit.com,PROXY
      - DOMAIN-SUFFIX,appattest.apple.com,PROXY

      # iCloud 服务
      - DOMAIN-SUFFIX,icloud.com,PROXY
      - DOMAIN-SUFFIX,icloud-content.com,PROXY
      - DOMAIN-SUFFIX,apple-datastore.com,PROXY

      # App Store / 内容分发
      - DOMAIN-SUFFIX,mzstatic.com,PROXY
      - DOMAIN-SUFFIX,apps.apple.com,PROXY
      - DOMAIN-SUFFIX,itunes.apple.com,PROXY
      - DOMAIN-SUFFIX,phobos.apple.com,PROXY

      # Apple Push Notification (APNs)
      - DOMAIN-SUFFIX,push.apple.com,PROXY
      - DOMAIN,courier.push.apple.com,PROXY
      - DOMAIN-SUFFIX,apns.apple.com,PROXY

      # 软件更新
      - DOMAIN-SUFFIX,swscan.apple.com,PROXY
      - DOMAIN-SUFFIX,swdist.apple.com,PROXY
      - DOMAIN-SUFFIX,swcdn.apple.com,PROXY
      - DOMAIN-SUFFIX,swquery.apple.com,PROXY
